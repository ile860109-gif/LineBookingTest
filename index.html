<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>線上預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f4f7f6;
      }
      .container {
        max-width: 400px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        color: #333;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        color: #666;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #06c755;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        margin-top: 20px;
        cursor: pointer;
      }
      button:hover {
        background-color: #05b04b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>預約服務</h2>
      <form id="bookingForm">
        <label>姓名</label>
        <input type="text" id="name" required placeholder="請輸入姓名" />

        <label>電話</label>
        <input type="tel" id="phone" required placeholder="請輸入手機號碼" />

        <label>預約日期</label>
        <input type="date" id="date" required />

        <label>預約時段</label>
        <select id="time" required>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
        </select>

        <button type="submit">確認送出預約</button>
      </form>
    </div>

    <script>
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbwLmsXMH0K2EIGqKrzfxACr2DBMPYXG_-8_Rzp8RPYBHs5I6KlAFjxI5h6FaHpuZHaA5A/exec"; // ⚠️請貼上第一步取得的 GAS 網址
      const LIFF_ID = "22009985937-9ToPGhgv"; // ⚠️第三步取得後回來填寫

      // 初始化 LIFF
      async function initLIFF() {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login();
          }
        } catch (error) {
          console.error("LIFF 初始化失敗", error);
        }
      }

      // 監聽表單送出事件
      document
        .getElementById("bookingForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const data = {
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            date: document.getElementById("date").value,
            time: document.getElementById("time").value,
          };

          // 發送資料到後端 GAS
          try {
            const response = await fetch(GAS_URL, {
              method: "POST",
              body: JSON.stringify(data),
            });
            const result = await response.json();

            if (result.status === "success") {
              alert("預約成功！");

              // 讓機器人在聊天室自動發送一句話（提示使用者已完成）
              if (liff.isInClient()) {
                liff
                  .sendMessages([
                    {
                      type: "text",
                      text: `🎉 我已成功預約：\n日期：${data.date}\n時間：${data.time}`,
                    },
                  ])
                  .then(() => {
                    liff.closeWindow(); // 關閉 LIFF 視窗
                  });
              }
            } else {
              alert("預約失敗，請稍後再試");
            }
          } catch (error) {
            alert("系統錯誤：" + error);
          }
        });

      initLIFF();
    </script>
  </body>
</html>
