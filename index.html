<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>線上預約系統 v2</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f4f7f6;
      }
      .container {
        max-width: 400px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        color: #333;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        color: #666;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #06c755;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        margin-top: 20px;
        cursor: pointer;
      }
      button:hover {
        background-color: #05b04b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>預約服務</h2>
      <form id="bookingForm">
        <label>員工編號</label>
        <input type="text" id="empId" required placeholder="請輸入員工編號" />

        <label>姓名</label>
        <input type="text" id="name" required placeholder="請輸入姓名" />

        <label>電話</label>
        <input type="tel" id="phone" required placeholder="請輸入手機號碼" />

        <label>預約日期</label>
        <input type="date" id="date" required />

        <label>預約時段</label>
        <select id="time" required>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
        </select>

        <button type="submit">確認送出預約</button>
      </form>
    </div>

    <script>
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbySjiafUA-WNzH5tG2LkSRS9EttMz685j0S1U5rwUOjxMexH7UETzVku5GTU_NtxXSR8g/exec"; // ⚠️請填入你付費版新部署的 GAS 網址
      const LIFF_ID = "2009985937-9ToPGhgv"; // ⚠️請填入你的 LIFF ID

      async function initLIFF() {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login();
          }
        } catch (error) {
          console.error("LIFF 初始化失敗", error);
        }
      }

      document
        .getElementById("bookingForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const data = {
            empId: document.getElementById("empId").value,
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            date: document.getElementById("date").value,
            time: document.getElementById("time").value,
          };

          try {
            const response = await fetch(GAS_URL, {
              method: "POST",
              body: JSON.stringify(data),
            });
            const result = await response.json();

            if (result.status === "success") {
              alert("🎉 預約成功！");
              if (liff.isInClient()) {
                liff
                  .sendMessages([
                    {
                      type: "text",
                      text: `🎉 預約成功通知：\n員工編號：${data.empId}\n姓名：${data.name}\n時段：${data.date} ${data.time}`,
                    },
                  ])
                  .then(() => {
                    liff.closeWindow();
                  });
              }
            } else if (result.status === "conflict") {
              // 重複預約時的提示
              alert(result.message);
            } else {
              alert("預約失敗，請稍後再試");
            }
          } catch (error) {
            alert("系統錯誤：" + error);
          }
        });

      initLIFF();
    </script>
  </body>
</html>
